<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="55%" stop-color="#7ee7d3"/>
      <stop offset="100%" stop-color="#69d2c5"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#48b5d8"/>
      <stop offset="100%" stop-color="#0aa3a6"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7d9a4"/>
      <stop offset="100%" stop-color="#f0c28a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feBlend in="SourceGraphic" in2="b"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Sun -->
  <g transform="translate(1500,180)">
    <circle r="90" fill="#fff29b" opacity="0.95"/>
    <circle r="180" fill="#fff29b" opacity="0.12"/>
  </g>

  <!-- Sea -->
  <g transform="translate(0,420)">
    <rect width="1920" height="380" fill="url(#sea)"/>
    <!-- waves -->
    <g opacity="0.12" fill="#ffffff">
      <path d="M0 100 C160 60 320 140 480 100 C640 60 800 140 960 100 C1120 60 1280 140 1440 100 C1600 60 1760 140 1920 100 L1920 200 L0 200 Z"/>
      <path d="M0 140 C160 100 320 180 480 140 C640 100 800 180 960 140 C1120 100 1280 180 1440 140 C1600 100 1760 180 1920 140 L1920 260 L0 260 Z"/>
    </g>
  </g>

  <!-- Beach -->
  <g transform="translate(0,760)">
    <rect width="1920" height="320" fill="url(#sand)"/>
    <ellipse cx="1600" cy="80" rx="380" ry="80" fill="#f1b96b" opacity="0.18"/>
  </g>

  <!-- Palm silhouette -->
  <g transform="translate(300,600) scale(1.1)" fill="#0b4f3b">
    <path d="M50 200 C40 120 70 40 80 0 C82 -10 110 -20 120 0 C132 24 120 60 125 90 C132 130 150 150 150 190 C100 200 60 210 50 200 Z"/>
    <g transform="translate(60,10) rotate(-20)">
      <path d="M0 0 C-60 -30 -120 -40 -160 -20 C-100 0 -40 10 0 0 Z"/>
    </g>
    <g transform="translate(80,-10) rotate(10)">
      <path d="M0 0 C60 -30 120 -40 160 -20 C100 0 40 10 0 0 Z"/>
    </g>
    <g transform="translate(40,20) rotate(-40)">
      <path d="M0 0 C-40 -20 -80 -30 -100 -10 C-60 10 -20 10 0 0 Z"/>
    </g>
  </g>

  <!-- subtle overlay to tie palette -->
  <rect width="1920" height="1080" fill="rgba(0,0,0,0.02)"/>
</svg>
